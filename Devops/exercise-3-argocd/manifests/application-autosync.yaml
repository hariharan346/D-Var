apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/hariharan346/D-Var.git'
    targetRevision: main
    path: Devops/exercise-3-argocd/manifests
    directory:
      exclude: 'application*.yaml'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true     # Automatically delete resources that are no longer defined in Git
      selfHeal: true  # Automatically sync cluster back to Git desired state if drift occurs
    syncOptions:
    - CreateNamespace=true # Create target namespace if it doesn't exist
